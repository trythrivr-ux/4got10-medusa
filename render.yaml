services:
  - type: web
    name: 4got10-medusa-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: medusa-backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: medusa-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        value: http://localhost:8000
      - key: ADMIN_CORS
        value: http://localhost:9000
      - key: AUTH_CORS
        value: http://localhost:9000

databases:
  - name: medusa-db
    region: oregon
